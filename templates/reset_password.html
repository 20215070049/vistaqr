<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if lang == 'tr' %}Yeni Şifre Belirle{% else %}Set New Password{% endif %} | VistaQR</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 350px;
            text-align: center;
            position: relative;
        }
        .lang {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 13px;
        }
        .lang a {
            color: #2a5298;
            text-decoration: none;
            margin-left: 6px;
        }
        h2 { color: #1e3c72; margin-bottom: 15px; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        button {
            border: none;
            background-color: #2a5298;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #1e3c72; }
        .msg { margin-top: 10px; font-size: 14px; color: red; }
        a { color: #2a5298; text-decoration: none; font-size: 14px; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="box">
        <div class="lang">
            <a href="{{ url_for('set_language', lang_code='tr') }}">TR</a> /
            <a href="{{ url_for('set_language', lang_code='en') }}">EN</a>
        </div>
        <h2>{% if lang == 'tr' %}Yeni Şifre Belirle{% else %}Set New Password{% endif %}</h2>

        <form method="POST">
            <input type="password" name="password" placeholder="{% if lang == 'tr' %}Yeni Şifre{% else %}New Password{% endif %}" required>
            <button type="submit">{% if lang == 'tr' %}Şifreyi Güncelle{% else %}Update Password{% endif %}</button>

            {% if error %}
                <p class="msg">{{ error }}</p>
            {% endif %}
        </form>

        <a href="{{ url_for('user_login') }}">{% if lang == 'tr' %}Giriş Sayfasına Dön{% else %}Return to Login{% endif %}</a>
    </div>
</body>
</html>
